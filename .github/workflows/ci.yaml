name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short
  NEXTEST_PROFILE: ci
  CI: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/journey_dynamics

jobs:
  ci:
    runs-on: ubuntu-latest

    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name ==
      github.event.pull_request.base.repo.full_name

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: journey_dynamics
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Lints
        shell: bash
        run: |
          cargo fmt --all --check
          cargo clippy -- --no-deps -Dclippy::pedantic -Dwarnings

      - name: Install nextest
        shell: bash
        run: |
          set -euxo pipefail
          curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Tests
        shell: bash
        run: |
          cargo nextest run --all-features
          cargo test --doc --all-features

      - name: Build server
        shell: bash
        run: |
          set -euxo pipefail
          cargo build

      - name: Install Hurl
        shell: bash
        run: |
          set -euxo pipefail
          HURL_LATEST=$(curl -s https://api.github.com/repos/Orange-OpenSource/hurl/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -LO "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_LATEST}/hurl_${HURL_LATEST}_amd64.deb"
          sudo dpkg -i "hurl_${HURL_LATEST}_amd64.deb"

      - name: Integration Tests (Hurl)
        shell: bash
        env:
          HURL_host: http://localhost:3030
        run: |
          set -euxo pipefail
          export JOURNEY_KEK=$(openssl rand -base64 32)
          ./target/debug/journey_dynamics &
          SERVER_PID=$!
          printf 'GET http://localhost:3030/journeys/00000000-0000-0000-0000-000000000000\nHTTP 404' | hurl --retry 30 --retry-interval 1000 > /dev/null
          hurl --test --report-html target/hurl-report \
            tests/error-cases.hurl \
            tests/full-flight-booking.hurl \
            tests/full-flight-booking_with_shredding.hurl
          kill $SERVER_PID

      - name: Upload Hurl Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hurl-report
          path: target/hurl-report
